server:
  port: 8080
  servlet:
    session:
      cookie:
        name: RESOURCE_SERVER_SESSION

logging:
  level:
    ca.tetervak: trace
    org.springframework.security: trace # Added for easier debugging

spring:
  application:
    name: CityDataServer

  # FIXED INDENTATION BELOW
  datasource:
    url: jdbc:h2:mem:default
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          # Swagger uses this registration
          swagger-client-reg:
            provider: spring-auth-server # Explicitly pointing to the provider below
            client-id: swagger-client
            client-secret: swagger-secret
            authorization-grant-type: authorization_code
            scope: openid, profile, read
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          # Secret Page uses this registration
          resource-server-reg:
            provider: spring-auth-server # Explicitly pointing to the same provider
            client-id: resource-server-client
            client-secret: resource-server-secret
            authorization-grant-type: authorization_code
            scope: openid, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

        provider:
          # Centralized definition of your Port 9000 server
          spring-auth-server:
            issuer-uri: http://localhost:9000

      # Protects the /api/** endpoints using JWT validation
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

springdoc:
  api-docs:
    path: /cities-api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Uncomment these to save time during testing
    oauth:
      client-id: swagger-client
      client-secret: swagger-secret
    try-it-out-enabled: true